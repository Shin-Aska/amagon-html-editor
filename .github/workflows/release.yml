name: Build and Release Electron App

# Strategy: Only run on version tags to save private repo minutes
on:
  push:
    tags:
      - 'v*'
  # Allows you to trigger the build manually from the GitHub Actions tab
  workflow_dispatch:

# Grant the GITHUB_TOKEN permission to create releases and upload assets
permissions:
  contents: write

jobs:
  release:
    # Use a matrix to run the job on different OS virtual machines
    strategy:
      matrix:
        # NOTE: macos-latest is temporarily excluded since this is a private repo
        # macOS GitHub runners consume minutes at a 10x multiplier!
        # Once public, you can freely add `macos-latest` back to this array.
        os: [ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Code
        run: npm run build

      - name: Build and Publish with electron-builder
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "Linux" ]; then
            npm run dist:linux -- --publish always
          elif [ "$RUNNER_OS" == "Windows" ]; then
            npm run dist:win -- --publish always
          elif [ "$RUNNER_OS" == "macOS" ]; then
            npm run dist:mac -- --publish always
          fi
